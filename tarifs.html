        "@type": "Question",
        "name": "Combien coûte un photographe de mariage en Suisse romande ?",
        "acceptedAnswer": { "@type": "Answer", "text": "Un reportage de mariage se situe généralement entre CHF 1'690 (demi-journée) et CHF 4'500 et plus (couverture sur deux jours, second photographe et album). La formule la plus choisie — Signature, 10 h de couverture — est à CHF 2'690. Chaque devis reste personnalisé selon le déroulé." }
      },
      {
        "@type": "Question",
        "name": "Les frais de déplacement sont-ils inclus ?",
        "acceptedAnswer": { "@type": "Answer", "text": "Oui — aucun frais de déplacement à l'intérieur de la Suisse romande (Vaud, Genève, Fribourg, Neuchâtel, Valais). Pour un projet ailleurs en Suisse ou à l'étranger, le déplacement et l'hébergement éventuel sont chiffrés clairement dans le devis." }
      },
      {
        "@type": "Question",
        "name": "Les tarifs sont-ils fixes ou sur devis ?",
        "acceptedAnswer": { "@type": "Answer", "text": "Les prix affichés sont des repères transparents, alignés sur le marché romand. Le devis final est personnalisé : il s'ajuste à la durée, au lieu, aux livrables (album, tirages) et aux options choisies." }
      },
      {
        "@type": "Question",
        "name": "Comment réserver et régler ?",
        "acceptedAnswer": { "@type": "Answer", "text": "La date est bloquée à la signature du contrat et au versement d'un acompte de 30 %. Le solde est réglé avant la prestation. Pour les mariages, il est conseillé de réserver 8 à 14 mois à l'avance pour les samedis de mai à septembre." }
      },
      {
        "@type": "Question",
        "name": "Proposez-vous des bons cadeaux ?",
        "acceptedAnswer": { "@type": "Answer", "text": "Oui, des bons cadeaux personnalisés valables un an — pour une séance portrait, couple ou maternité. Une belle idée de cadeau pour une demande, un anniversaire ou les fêtes." }
      }
