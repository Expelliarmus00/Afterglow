    <h1 style="font-weight:400;letter-spacing:.02em">Avis clients</h1>
    <p style="color:#cdbfa8;line-height:1.7">Avis et témoignages de mariés, familles et professionnels photographiés par Kevin Chinelli en Suisse romande. Note de 5/5 sur l'ensemble des retours.</p>
    <p style="color:#cdbfa8;line-height:1.7">« Kevin a capturé notre mariage avec une justesse rare. Chaque image raconte précisément ce que nous avons ressenti ce jour-là. » — Camille & Thomas, Lavaux « Discret toute la journée, et pourtant rien ne lui a échappé. Nos photos sont d'une élégance folle. » — Sophie & Julien, Fribourg « Je me trouve enfin à mon avantage sur une photo. Naturel, juste, sans surjeu. » — Sarah, Lausanne « Des portraits qui me ressemblent vraiment — je les utilise partout, du site au LinkedIn. » — Damien, Genève « Une bulle de douceur. Je ne me trouvais jamais photogénique enceinte — Kevin m'a fait changer d'avis. » — Marie, Vevey « Des images d'une finesse incroyable, qui resteront dans la famille pour toujours. » — Élodie & Nicolas, Neuchâtel « Mes nouveaux portraits corporate ont transformé l'image de mon entreprise. Net, élégant, professionnel. » — Antoine, CEO · Genève « Kevin met instantanément à l'aise. Je déteste être photographiée — là, j'ai adoré le résultat. » — Valérie, Morges « On riait tellement qu'on a oublié l'appareil. Les photos sont à notre image : vivantes et vraies. » — Inès & Karim, Montreux « Le cadeau de fiançailles parfait. On a hâte de retravailler avec Kevin pour le mariage. » — Laura & Maxime, Sion</p>
