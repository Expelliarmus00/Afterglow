name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on VPS
    runs-on: self-hosted

    steps:
      - name: Update site
        run: |
          set -e
          echo "▶ Mise à jour du site Afterglow by Kevin..."
          cd /var/www/afterglow
          git fetch origin
          git reset --hard origin/main
          find . -type f -name "*.php" -exec chmod 644 {} \;
          find . -type d -exec chmod 755 {} \;
          echo "✅ Déploiement terminé !"
