name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "▶ Mise à jour du site Afterglow by Kevin..."
            cd /var/www/afterglow
            git pull origin main
            # Permissions correctes pour les fichiers PHP
            find . -type f -name "*.php" -exec chmod 644 {} \;
            find . -type d -exec chmod 755 {} \;
            # Caddy charge automatiquement les changements de fichiers statiques
            echo "✅ Déploiement terminé ! Site à jour sur afterglowbykevin.ch"
