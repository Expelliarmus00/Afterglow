# ============================================================
# Afterglow by Kevin — Configuration Nginx
# afterglowbykevin.ch
#
# Copier ce fichier sur le VPS :
#   sudo cp nginx.conf /etc/nginx/sites-available/afterglowbykevin.ch
#   sudo ln -s /etc/nginx/sites-available/afterglowbykevin.ch /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name afterglowbykevin.ch www.afterglowbykevin.ch;

    # Certbot utilisera ce bloc pour le challenge ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://afterglowbykevin.ch$request_uri;
    }
}

# Redirection www → non-www (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.afterglowbykevin.ch;

    ssl_certificate     /etc/letsencrypt/live/afterglowbykevin.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/afterglowbykevin.ch/privkey.pem;

    return 301 https://afterglowbykevin.ch$request_uri;
}

# Bloc principal HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name afterglowbykevin.ch;

    root  /var/www/afterglowbykevin.ch;
    index "index.html" index.html;

    # --- SSL (géré par Certbot) ---
    ssl_certificate     /etc/letsencrypt/live/afterglowbykevin.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/afterglowbykevin.ch/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # --- Compression ---
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # --- Cache statique ---
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # --- PHP (formulaire de contact) ---
    location ~ \.php$ {
        # Ajuster la version PHP si nécessaire (php8.1, php8.2, php8.3...)
        fastcgi_pass  unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M";
    }

    # --- Page d'accueil ---
    location = / {
        try_files "index.html" =404;
    }

    # --- Routes HTML ---
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # --- Sécurité : bloquer les fichiers sensibles ---
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }

    location ~* \.(md|csv|jsx|json|napkin)$ {
        deny all;
        return 404;
    }

    # Bloquer l'accès aux dossiers dev
    location ~ ^/(screenshots|scraps|uploads)/ {
        deny all;
        return 404;
    }

    # --- Logs ---
    access_log /var/log/nginx/afterglowbykevin.ch.access.log;
    error_log  /var/log/nginx/afterglowbykevin.ch.error.log;
}
