<script>
/* Boot splash — paints instantly (styled by kc.css in <head>), dismissed
   once per session with a single zoom-fade. No double-dismiss, no blank frame. */
(function () {
  var boot = document.getElementById('boot');
  if (!boot) return;
  var seen = false, reduce = false;
  try { seen = sessionStorage.getItem('kc-welcomed'); } catch (e) {}
  try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
  if (seen) { boot.parentNode && boot.remove(); return; }
  try { sessionStorage.setItem('kc-welcomed', '1'); } catch (e) {}
  function dismiss() {
    if (!boot.parentNode) return;
    boot.classList.add('boot--gone');
    var killed = false, kill = function () { if (!killed) { killed = true; boot.remove(); } };
    boot.addEventListener('transitionend', kill, { once: true });
    setTimeout(kill, 1100);
  }
  if (reduce) { boot.remove(); return; }
  var minTime = 800, start = Date.now();
  function release() { setTimeout(dismiss, Math.max(0, minTime - (Date.now() - start))); }
  if (document.readyState === 'complete') release();
  else window.addEventListener('load', release);
  setTimeout(dismiss, 4200); // safety cap
})();
</script>

<script>
/* Detect a frozen animation timeline (offscreen/throttled previews) and
   fall back to fully-revealed content so nothing is ever invisible. */
(function () {
  try {
    var p = document.createElement('div');
    p.style.cssText = 'position:fixed;left:-9999px;top:0;width:2px;height:2px;opacity:0;transition:opacity .05s linear;pointer-events:none';
    document.documentElement.appendChild(p);
    requestAnimationFrame(function () { p.style.opacity = '1'; });
    setTimeout(function () {
      var op = parseFloat(getComputedStyle(p).opacity);
      if (!(op > 0.9)) document.documentElement.classList.add('no-anim');
      p.remove();
    }, 220);
  } catch (e) {}
})();
</script>
